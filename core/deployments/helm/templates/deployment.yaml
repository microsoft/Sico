apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-core
  labels:
    app: sico-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: sico-core
  template:
    metadata:
      labels:
        app: sico-core
    spec:
      serviceAccountName: sico-core
      containers:
        - name: sico-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.ports.grpc }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- $taskRuntime := index .Values "taskRuntime" | default dict }}
            - name: TASK_RUNTIME_PYTHON_RUNNER_IMAGE
              value: {{ default (printf "%s:%s" .Values.image.repository .Values.image.tag) (index $taskRuntime "pythonRunnerImage") | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: REDIS_PASSWORD
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: core-storage
              mountPath: /mnt/storage
            - name: mem0-data
              mountPath: /root/.mem0
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: tmp
          emptyDir: {}
        - name: mem0-data
          emptyDir: {}
        - name: core-storage
          persistentVolumeClaim:
            claimName: core-storage
