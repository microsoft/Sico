replicaCount: 1

image:
  repository: localhost:5000/sico/sico-core
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  ports:
    grpc: 50053

env:
  GRPC_SERVER_ADDRESS: "0.0.0.0:50053"
  REDIS_HOST: sico-redis
  REDIS_PORT: "6379"
  REVERSE_GRPC_ADDRESS: "sico-backend:50054"
  EVENT_BUS_TYPE: kafka
  EVENT_BUS_TOPIC: core-backend
  KAFKA_BOOTSTRAP_SERVERS: "sico-kafka:9092"
  MEM0_QDRANT_HOST: sico-qdrant
  EXPERIENCES_ENABLED: "true"
  RUN_PYTHON_TOOL_SANDBOX_LOCAL_MODE: "false"
  RUN_PYTHON_TOOL_SANDBOX_VOLUME_TYPE: "hostpath"
  RUN_PYTHON_TOOL_SANDBOX_HOSTPATH_BASE: "/mnt/sico-storage/chat"
  SEAWEEDFS_ENDPOINT: "http://sico-seaweedfs-filer:14003"
  SICO_ENDPOINT: "http://sico-backend.sico.svc.cluster.local:8080"

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

# Secret name containing REDIS_PASSWORD
secretName: sico-credentials
