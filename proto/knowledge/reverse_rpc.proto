syntax = "proto3";

package reverse_rpc;
option go_package = "sico-backend/internal/transport/reverse_grpc/pb/knowledge/reverse_rpc";

service ReverseKnowledgeRPC {
    // Fetch knowledge metadata (name and tags) for a list of knowledge document IDs.
    rpc RpcListKnowledgeMetadata(GetKnowledgeMetadataRequest) returns (GetKnowledgeMetadataResponse) {}

    // Create or update a knowledge playbook for a given project and agent instance.
    // If a playbook already exists for the (project_id, agent_instance_id) pair,
    // only the updated_at timestamp is refreshed; otherwise a new record is created.
    rpc RpcUpsertKnowledgePlaybook(UpsertKnowledgePlaybookRequest) returns (UpsertKnowledgePlaybookResponse) {}
}

message GetKnowledgeMetadataRequest {
    repeated int64 knowledge_ids = 1; // @gotag: json:"knowledgeIds"
}

message KnowledgeMetadata {
    int64 knowledge_id = 1;      // @gotag: json:"knowledgeId"
    string name = 2;             // @gotag: json:"name"
    repeated string tags = 3;    // @gotag: json:"tags"
}

message GetKnowledgeMetadataResponse {
    repeated KnowledgeMetadata data = 1; // @gotag: json:"data"
    int32 code = 253;                     // @gotag: json:"code"
    string msg = 254;                     // @gotag: json:"msg"
}

message UpsertKnowledgePlaybookRequest {
    int64 project_id = 1;          // @gotag: json:"projectId"
    int64 agent_instance_id = 2;   // @gotag: json:"agentInstanceId"
}

message UpsertKnowledgePlaybookResponse {
    int64 playbook_id = 1;        // @gotag: json:"playbookId"
    bool created = 2;             // @gotag: json:"created"
    int32 code = 253;             // @gotag: json:"code"
    string msg = 254;             // @gotag: json:"msg"
}
