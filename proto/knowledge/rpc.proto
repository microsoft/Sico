syntax = "proto3";

package knowledge;

option go_package = "sico-backend/internal/transport/grpc/pb/knowledge;knowledgegrpc";

import "knowledge/knowledge.proto";

service KnowledgeService {
    rpc ExtractDocument(KnowledgeDocument) returns (ExtractDocumentResponse) {}
    rpc GetDocumentDetails(GetDocumentDetailsRequest) returns (GetDocumentDetailsResponse) {}
    rpc GetPlaybookDetails(GetKnowledgePlaybookDetailsGrpcRequest) returns (GetKnowledgePlaybookDetailsGrpcResponse) {}
}

message ExtractDocumentResponse {
    string message = 1; // @gotag: json:"message"
    int32 code = 253;   // @gotag: json:"code"
}

message GetDocumentDetailsRequest {
    int64 document_id = 1;       // @gotag: json:"documentId"
    int64 project_id = 2;        // @gotag: json:"projectId"
    string agent_id = 3;         // @gotag: json:"agentId"
}

message GetDocumentDetailsResponse {
    string summary = 1;   // @gotag: json:"summary"
    string full_text = 2; // @gotag: json:"fullText"
    int32 code = 253;     // @gotag: json:"code"
    string msg = 254;     // @gotag: json:"msg"
}

message GetKnowledgePlaybookDetailsGrpcRequest {
    int64 playbook_id = 1;       // @gotag: json:"playbookId"
    int64 project_id = 2;        // @gotag: json:"projectId"
    int64 agent_instance_id = 3; // @gotag: json:"agentInstanceId"
}

message GetKnowledgePlaybookDetailsGrpcResponse {
    string content = 1;  // @gotag: json:"content"
    int32 code = 253;    // @gotag: json:"code"
    string msg = 254;    // @gotag: json:"msg"
}
