syntax = "proto3";
package common;

option go_package = "sico-backend/internal/transport/http/dto/common";


message Attachment {
    string name = 1;     // @gotag: json:"name"
    string uri = 2;      // @gotag: json:"uri"
    string sas_url = 3;  // @gotag: json:"sasUrl"
    string type = 4;     // @gotag: json:"type"
    int64 size = 5;      // @gotag: json:"size"
    int64 id = 6;        // @gotag: json:"id"
}


message DocTableSheet {
    int64 id = 1;            // sheet number/ID
    string sheet_name = 2;   // sheet name
    int64 total_row = 3;     // total number of rows
}

enum ColumnType {
    COLUMN_TYPE_UNKNOWN = 0; // Unknown
    COLUMN_TYPE_TEXT = 1;    // Text
    COLUMN_TYPE_NUMBER = 2;  // Number
    COLUMN_TYPE_DATE = 3;    // Date
    COLUMN_TYPE_FLOAT = 4;   // Float
    COLUMN_TYPE_BOOLEAN = 5; // Boolean
    COLUMN_TYPE_IMAGE = 6;   // Image
}

enum FileType {
    FILE_TYPE_UNKNOWN = 0;
    FILE_TYPE_TYPE_IMAGE = 1;
    FILE_TYPE_TYPE_VIDEO = 2;
    FILE_TYPE_TYPE_AUDIO = 3;
    FILE_TYPE_TYPE_FILE = 4;
    FILE_TYPE_TYPE_ARCHIVE = 5;
}

message DocTableColumn {
    int64 id = 1;                // column ID
    string column_name = 2;      // column name
    bool is_semantic = 3;        // whether it's a semantic matching column
    int64 sequence = 4;          // original column sequence number in excel
    optional ColumnType column_type = 5;  // column type
    optional bool contains_empty_value = 6; // whether contains empty values
    optional string desc = 7;             // description
}

message TypeInfo {
    string data_type = 1; // @gotag: json:"dataType" binding:"required"
    bool required = 2; // @gotag: json:"required,omitempty"
    string description = 3; // @gotag: json:"description,omitempty"
    optional TypeInfo elem_type = 4; // @gotag: json:"elemType,omitempty"
    map<string, TypeInfo> properties = 5; // @gotag: json:"properties,omitempty"
    optional string file_sub_type = 6; // @gotag: json:"fileSubType,omitempty"
}

message NamedTypeInfo {
    string name = 1; // @gotag: json:"name" binding:"required"
    TypeInfo type = 2; // @gotag: json:"type" binding:"required"
}

// SortOrder specifies the sort direction for list queries.
enum SortOrder {
    SORT_ORDER_UNSPECIFIED = 0; // Default: DESC
    SORT_ORDER_ASC = 1;
    SORT_ORDER_DESC = 2;
}

// AgentInstanceDigest holds display information about an agent instance.
message AgentInstanceDigest {
    string agent_name = 1;        // @gotag: json:"agentName"
    string agent_icon_url = 2;    // @gotag: json:"agentIconUrl"
    string operator_username = 3; // @gotag: json:"operatorUsername"
    int64 id = 4;                 // @gotag: json:"id"
}

// UserDigest holds summary information about a user.
message UserDigest {
    int64 id = 1;          // @gotag: json:"id"
    string alias = 2;      // @gotag: json:"alias"
    string username = 3;   // @gotag: json:"username"
    string email = 4;      // @gotag: json:"email"
    string icon_url = 5;   // @gotag: json:"iconUrl"
}

// SandboxDigest holds summary information about a sandbox.
message SandboxDigest {
    string sandbox_id = 1;      // @gotag: json:"sandboxId"
    string type = 2;            // @gotag: json:"type"
    string status = 3;          // @gotag: json:"status"
    string endpoint = 4;        // @gotag: json:"endpoint"
    string vnc_url = 5;         // @gotag: json:"vncUrl"
    string docs_url = 6;        // @gotag: json:"docsUrl"
    string display_name = 7;    // @gotag: json:"displayName"
    int64 instance_id = 8;      // @gotag: json:"instanceId"
    int64 project_id = 9;       // @gotag: json:"projectId"
    int64 organization_id = 10; // @gotag: json:"organizationId"
}
