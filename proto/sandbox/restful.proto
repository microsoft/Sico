syntax = "proto3";

package sandbox;
option go_package = "sico-backend/internal/transport/http/dto/sandbox";

import "common/common.proto";

// Unified sandbox control plane DTOs (HTTP/JSON).
// NOTE: Use strings for `type/status` to keep JSON binding simple.

message SandboxResource {
  string type = 1;        // @gotag: json:"type"
  string resource_id = 2; // @gotag: json:"resourceId"
  string display_name = 3; // @gotag: json:"displayName,omitempty"
  string status = 4;      // @gotag: json:"status"  // available|in_use|unhealthy|unknown
  string sandbox_id = 5;  // @gotag: json:"sandboxId,omitempty"
  map<string, string> metadata = 6; // @gotag: json:"metadata,omitempty"
}

message SandboxLease {
  // sandbox_id format: {type}:{resourceID}, e.g. "emulator:http://192.168.1.1:8080"
  string sandbox_id = 1;  // @gotag: json:"sandboxId"
  string user = 4;        // @gotag: json:"user,omitempty"
  int64 created_at = 5;   // @gotag: json:"createdAt"
  map<string, string> metadata = 9; // @gotag: json:"metadata,omitempty"
}

message ListSandboxResourcesRequest {
  string type = 1; // @gotag: form:"type" binding:"omitempty,oneof=emulator aio"
}

message ListSandboxResourcesResponse {
  ListSandboxResourcesResponseData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ListSandboxResourcesResponseData {
  repeated SandboxResource resources = 1; // @gotag: json:"resources"
}

message ListSandboxLeasesRequest {
  string type = 1; // @gotag: form:"type" binding:"omitempty,oneof=emulator aio"
}

message ListSandboxLeasesResponse {
  ListSandboxLeasesResponseData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ListSandboxLeasesResponseData {
  repeated SandboxLease leases = 1; // @gotag: json:"leases"
}

message CreateSandboxLeaseRequest {
  string type = 1;        // @gotag: json:"type" binding:"required,oneof=emulator aio"
  // Transport sets this from auth context.
  string requester_username = 10; // @gotag: json:"-"
}

message CreateSandboxLeaseResponse {
  CreateSandboxLeaseResponseData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message CreateSandboxLeaseResponseData {
  SandboxLease lease = 1; // @gotag: json:"lease"
}

message ResetSandboxLeaseResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ReleaseSandboxLeaseResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

// ==================== Client API types ====================

message SandboxApplyRequest {
  string type = 1; // @gotag: json:"type" binding:"required"
}

message SandboxResetRequest {
  string sandbox_id = 1; // @gotag: json:"sandbox_id" binding:"required"
}

message SandboxReleaseRequest {
  string sandbox_id = 1; // @gotag: json:"sandbox_id" binding:"required"
}

// ==================== Dashboard Management types ====================

message SandboxResourceInfo {
  string sandbox_id = 1;     // @gotag: json:"sandbox_id"
  string type = 2;            // @gotag: json:"type"
  string status = 3;          // @gotag: json:"status"
  string instance_id = 4;     // @gotag: json:"instance_id"
  string instance_name = 5;   // @gotag: json:"instance_name"
  string display_name = 6;    // @gotag: json:"display_name"
  string endpoint = 7;        // @gotag: json:"endpoint"
  string vnc_url = 8;         // @gotag: json:"vnc_url"
  string docs_url = 9;        // @gotag: json:"docs_url"
  int64 usage_seconds = 10;   // @gotag: json:"usage_seconds"
  int64 created_at = 11;      // @gotag: json:"created_at,omitempty"
  int64 expires_at = 12;      // @gotag: json:"expires_at,omitempty"
  int64 organization_id = 13; // @gotag: json:"organization_id"
  int64 project_id = 14;      // @gotag: json:"project_id"
}

message SandboxResourcesByType {
  repeated SandboxResourceInfo emulator = 1; // @gotag: json:"emulator"
  repeated SandboxResourceInfo aio = 2;      // @gotag: json:"aio"
  repeated SandboxResourceInfo wincua = 3;   // @gotag: json:"wincua"
}

message SandboxVNCInfo {
  string sandbox_id = 1; // @gotag: json:"sandbox_id"
  string type = 2;        // @gotag: json:"type"
  string vnc_url = 3;     // @gotag: json:"vnc_url"
}

message GetInstanceSandboxesRequest {
  string instance_id = 1; // @gotag: form:"instanceId" binding:"required"
  string type = 2;        // @gotag: form:"type" binding:"omitempty,oneof=emulator aio wincua"
}

message InstanceSandboxStatusInfo {
  string sandbox_id = 1;   // @gotag: json:"sandboxId"
  string type = 2;         // @gotag: json:"type"
  string status = 3;       // @gotag: json:"status"
  string endpoint = 4;     // @gotag: json:"endpoint"
  string vnc_url = 5;      // @gotag: json:"vncUrl"
  string docs_url = 6;     // @gotag: json:"docsUrl"
  string display_name = 7; // @gotag: json:"displayName"
}

message GetInstanceSandboxesData {
  repeated InstanceSandboxStatusInfo items = 1; // @gotag: json:"items"
}

message GetInstanceSandboxesResponse {
  GetInstanceSandboxesData data = 1; // @gotag: json:"data"
  int32 code = 253;                  // @gotag: json:"code"
  string msg = 254;                  // @gotag: json:"msg"
}

// ==================== Assignment types ====================

message SandboxAssignRequest {
  string instance_id = 1; // @gotag: json:"instance_id" binding:"required"
  string sandbox_id = 2;  // @gotag: json:"sandbox_id" binding:"required"
}

message SandboxUnassignRequest {
  string instance_id = 1; // @gotag: json:"instance_id" binding:"required"
  string sandbox_id = 2;  // @gotag: json:"sandbox_id" binding:"required"
}

// Org-level sandbox assignment (batch)
message SandboxOrgAssignRequest {
  int64 organization_id = 1;        // @gotag: json:"organization_id" binding:"required"
  repeated string sandbox_ids = 2;  // @gotag: json:"sandbox_ids" binding:"required,min=1"
}

message SandboxOrgUnassignRequest {
  int64 organization_id = 1;        // @gotag: json:"organization_id" binding:"required"
  repeated string sandbox_ids = 2;  // @gotag: json:"sandbox_ids" binding:"required,min=1"
}

// Project-level sandbox assignment (batch)
message SandboxProjectAssignRequest {
  int64 project_id = 1;             // @gotag: json:"project_id" binding:"required"
  repeated string sandbox_ids = 2;  // @gotag: json:"sandbox_ids" binding:"required,min=1"
}

message SandboxProjectUnassignRequest {
  int64 project_id = 1;             // @gotag: json:"project_id" binding:"required"
  repeated string sandbox_ids = 2;  // @gotag: json:"sandbox_ids" binding:"required,min=1"
}

// Filter for listing sandbox resources
message ListSandboxResourcesFilter {
  optional int64 organization_id = 1;   // @gotag: form:"organizationId" json:"organization_id"
  optional int64 project_id = 2;        // @gotag: form:"projectId" json:"project_id"
  optional string instance_id = 3;      // @gotag: form:"instanceId" json:"instance_id"
}

message SandboxInstanceInfo {
  string id = 1;     // @gotag: json:"id"
  string name = 2;   // @gotag: json:"name"
  string role = 3;   // @gotag: json:"role"
  repeated common.SandboxDigest sandboxes = 4; // @gotag: json:"sandboxes"
}
