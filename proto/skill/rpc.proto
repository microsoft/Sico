syntax = "proto3";

package skill;

option go_package = "sico-backend/internal/transport/grpc/pb/skill;skillgrpc";

import "skill/skill.proto";

service SkillService {
    // ExtractSkill downloads the skill zip from the given URL,
    // extracts it, and persists files to storage.
    rpc ExtractSkill(ExtractSkillRequest) returns (ExtractSkillResponse) {}

    // GetSkillDetails returns the file contents of a skill.
    rpc GetSkillDetails(GetSkillDetailsGrpcRequest) returns (GetSkillDetailsGrpcResponse) {}

    // DeleteSkillFromFS deletes the skill files from the filesystem.
    rpc DeleteSkillFromFS(DeleteSkillFromFSRequest) returns (DeleteSkillFromFSResponse) {}
}

message ExtractSkillRequest {
    int64 skill_id = 1;        // @gotag: json:"skillId"
    int64 project_id = 2;     // @gotag: json:"projectId"
    string agent_id = 3;      // @gotag: json:"agentId"
    string download_url = 4;  // @gotag: json:"downloadUrl"
}

message ExtractSkillResponse {
    string message = 1;     // @gotag: json:"message"
    string name = 2;        // @gotag: json:"name"
    string description = 3; // @gotag: json:"description"
    int32 code = 253;       // @gotag: json:"code"
}

message GetSkillDetailsGrpcRequest {
    int64 skill_id = 1;    // @gotag: json:"skillId"
    int64 project_id = 2;  // @gotag: json:"projectId"
    string agent_id = 3;   // @gotag: json:"agentId"
}

message GetSkillDetailsGrpcResponse {
    repeated SkillFile files = 1; // @gotag: json:"files"
    int32 code = 253;             // @gotag: json:"code"
    string msg = 254;             // @gotag: json:"msg"
}

message DeleteSkillFromFSRequest {
    int64 skill_id = 1;    // @gotag: json:"skillId"
    int64 project_id = 2;  // @gotag: json:"projectId"
    string agent_id = 3;   // @gotag: json:"agentId"
}

message DeleteSkillFromFSResponse {
    int32 code = 253;  // @gotag: json:"code"
    string msg = 254;  // @gotag: json:"msg"
}
