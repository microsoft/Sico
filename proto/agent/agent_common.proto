syntax = "proto3";
package common;

option go_package = "sico-backend/internal/transport/http/dto/agent/common";

// Model configuration information
message ModelInfo {
  int64 model_id = 1;           // @gotag: json:"modelId"
  double temperature = 2;       // @gotag: json:"temperature"
  int32 max_tokens = 3;         // @gotag: json:"maxTokens"
  double top_p = 4;             // @gotag: json:"topP"
  double frequency_penalty = 5; // @gotag: json:"frequencyPenalty"
  double presence_penalty = 6;  // @gotag: json:"presencePenalty"
  ShortMemoryPolicy short_memory_policy = 7; // @gotag: json:"shortMemoryPolicy"
  int32 top_k = 8;              // @gotag: json:"topK"
  ModelResponseFormat response_format = 9; // @gotag: json:"responseFormat"
  ModelStyle model_style = 10;  // @gotag: json:"modelStyle"
}

// Short memory policy configuration
message ShortMemoryPolicy {
  ContextMode context_mode = 1;  // @gotag: json:"contextMode"
  int32 history_round = 2;       // @gotag: json:"historyRound"
}

enum PromptType {
  PROMPT_TYPE_UNKNOWN = 0;
  PROMPT_TYPE_SYSTEM = 1;
  PROMPT_TYPE_USER = 2;
}

// Enums
enum ModelStyle {
  MODEL_STYLE_CUSTOM = 0;
  MODEL_STYLE_CREATIVE = 1;
  MODEL_STYLE_BALANCE = 2;
  MODEL_STYLE_PRECISE = 3;
}

enum ModelResponseFormat {
  MODEL_RESPONSE_FORMAT_TEXT = 0;
  MODEL_RESPONSE_FORMAT_MARKDOWN = 1;
  MODEL_RESPONSE_FORMAT_JSON = 2;
}

enum ContextMode {
  CONTEXT_MODE_CHAT = 0;
  CONTEXT_MODE_FUNCTION_CALL_1 = 1;
  CONTEXT_MODE_FUNCTION_CALL_2 = 2;
  CONTEXT_MODE_FUNCTION_CALL_3 = 3;
}
