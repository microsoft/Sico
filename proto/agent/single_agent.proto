syntax = "proto3";
package single_agent;

option go_package = "sico-backend/internal/transport/http/dto/agent/single_agent";

// Single Agent entity
message SingleAgent {
  string agent_id = 1;      // @gotag: json:"agentId"
  string creator_username = 2;    // @gotag: json:"creatorUsername"
  string name = 4;          // @gotag: json:"name"
  string desc = 5;          // @gotag: json:"desc"
  string icon_uri = 6;      // @gotag: json:"iconUri"
  string raw_icon_uri = 7;      // @gotag: json:"rawIconUri"
  int64 created_at = 8;     // @gotag: json:"createdAt"
  int64 updated_at = 9;     // @gotag: json:"updatedAt"
  string version = 10;       // @gotag: json:"version"
  string role = 11;         // @gotag: json:"role"
  string updater_username = 23;                        // @gotag: json:"updaterUsername"
  LLMHubConfig llmhub_config = 24;               // @gotag: json:"llmhubConfig,omitempty"
}

message LLMHubConfig {
  repeated string model_keys = 1;                     // @gotag: json:"modelKeys,omitempty"
  string default_global_model_key = 2;               // @gotag: json:"defaultGlobalModelKey,omitempty"
}

message AgentModelOption {
  string model_key = 1;                              // @gotag: json:"modelKey"
  string display_name = 2;                           // @gotag: json:"displayName"
  string description = 3;                            // @gotag: json:"description"
  string icon_uri = 4;                               // @gotag: json:"iconUri"
  int32 model_type = 5;                              // @gotag: json:"modelType"
  int32 provider_template_type = 6;                  // @gotag: json:"providerTemplateType"
}

message GetSingleAgentModelsResponse {
  GetSingleAgentModelsData data = 1;                 // @gotag: json:"data"
  int32 code = 253;                                  // @gotag: json:"code"
  string msg = 254;                                  // @gotag: json:"msg"
}

message GetSingleAgentModelsData {
  repeated AgentModelOption builtin_models = 1;      // @gotag: json:"builtinModels"
  repeated AgentModelOption custom_models = 2;       // @gotag: json:"customModels"
  LLMHubConfig selected_config = 3;                // @gotag: json:"selectedConfig,omitempty"
}

// Agent identity for runtime
message AgentIdentity {
  string agent_id = 1;      // @gotag: json:"agentId"
  string version = 2;       // @gotag: json:"version"
}

// Request to create a single agent
message CreateSingleAgentRequest {
  string agent_id = 1;      // @gotag: json:"-" form:"agentId" binding:"max=30"
  string creator_username = 2;    // @gotag: json:"-" form:"creatorUsername"
  string name = 4;          // @gotag: json:"name" form:"name" binding:"required,max=100"
  string desc = 5;          // @gotag: json:"desc" form:"desc" binding:"max=500"
  string icon_uri = 6;      // @gotag: json:"iconUri" form:"iconUri"
  string role = 7;          // @gotag: json:"role" form:"role"

  // Optional configuration
  string updater_username = 13;                                     // @gotag: json:"-"
  LLMHubConfig llmhub_config = 14;                             // @gotag: json:"llmhubConfig,omitempty"
}

// Response for creating a single agent
message CreateSingleAgentResponse {
  CreateSingleAgentData data = 1;   // @gotag: json:"data"
  int32 code = 253;                 // @gotag: json:"code"
  string msg = 254;                 // @gotag: json:"msg"
}

message CreateSingleAgentData {
  string agent_id = 1;       // @gotag: json:"agentId"
}

// Request to get a single agent
message GetSingleAgentRequest {
  string agent_id = 1;       // @gotag: form:"agentId" binding:"required"
}

// Response for getting a single agent
message GetSingleAgentResponse {
  GetSingleAgentData data = 1;    // @gotag: json:"data"
  int32 code = 253;               // @gotag: json:"code"
  string msg = 254;               // @gotag: json:"msg"
}

message GetSingleAgentData {
  SingleAgent agent = 1;    // @gotag: json:"agent"
}

// Request to update a single agent
message UpdateSingleAgentRequest {
  string agent_id = 1;                    // @gotag: json:"agentId" form:"agentId" binding:"required"
  string name = 2;                        // @gotag: json:"name" form:"name" binding:"max=100"
  string desc = 3;                        // @gotag: json:"desc" form:"desc" binding:"max=500"
  string icon_uri = 4;                    // @gotag: json:"iconUri" form:"iconUri"
  repeated string capability_tags = 5;    // @gotag: json:"-" form:"capabilityTags"
  string role = 6;                        // @gotag: json:"role" form:"role"

  string updater_username = 20;               // @gotag: json:"-"
  LLMHubConfig llmhub_config = 21;       // @gotag: json:"llmhubConfig,omitempty"
}

// Response for updating a single agent
message UpdateSingleAgentResponse {
  int32 code = 253;                 // @gotag: json:"code"
  string msg = 254;                 // @gotag: json:"msg"
}

// Request to delete a single agent
message DeleteSingleAgentRequest {
  string agent_id = 1;       // @gotag: form:"agentId" binding:"required"
}

// Response for deleting a single agent
message DeleteSingleAgentResponse {
  int32 code = 253;                 // @gotag: json:"code"
  string msg = 254;                 // @gotag: json:"msg"
}

// Request to list single agents
message ListSingleAgentsRequest {
  string creator_username = 1;    // @gotag: form:"creatorUsername" json:"-"
  int32 page = 3;           // @gotag: form:"page" binding:"required,min=1"
  int32 page_size = 4;      // @gotag: form:"pageSize" binding:"required,min=1,max=50"
}

// Response for listing single agents
message ListSingleAgentsResponse {
  ListSingleAgentsData data = 1;   // @gotag: json:"data"
  int32 code = 253;                // @gotag: json:"code"
  string msg = 254;                // @gotag: json:"msg"
}

message ListSingleAgentsData {
  repeated SingleAgent agents = 1; // @gotag: json:"agents"
  int32 total = 2;          // @gotag: json:"total"
  bool has_next = 3;        // @gotag: json:"hasNext"
}

// Request to list single agent roles
message ListSingleAgentInfosRequest {
}

// Response for listing single agent roles
message ListSingleAgentInfosResponse {
  ListSingleAgentInfosData data = 1;   // @gotag: json:"data"
  int32 code = 253;                // @gotag: json:"code"
  string msg = 254;                // @gotag: json:"msg"
}

message ListSingleAgentInfosData {
  repeated SingleAgentInfo agent_infos = 1; // @gotag: json:"agentInfos"
}

message SingleAgentInfo {
  string agent_id = 1;      // @gotag: json:"agentId"
  string role = 2;       // @gotag: json:"role"
  string name = 3;       // @gotag: json:"name"
  repeated string capability_tags = 4; // @gotag: json:"capabilityTags"
}

message ListRolesResponse {
  ListRolesData data = 1;          // @gotag: json:"data"
  int32 code = 253;                // @gotag: json:"code"
  string msg = 254;                // @gotag: json:"msg"
}

message ListRolesData {
  repeated string roles = 1;        // @gotag: json:"role"
}

// Request to deploy a single agent (create an agent instance from dev page)
message DeploySingleAgentRequest {
  string agent_id = 1;      // @gotag: json:"agentId" binding:"required"
  string name = 2;          // @gotag: json:"name" binding:"required,max=100"
}

// Response for deploying a single agent
message DeploySingleAgentResponse {
  DeploySingleAgentData data = 1;   // @gotag: json:"data"
  int32 code = 253;                 // @gotag: json:"code"
  string msg = 254;                 // @gotag: json:"msg"
}

message DeploySingleAgentData {
  int64 id = 1;                     // @gotag: json:"id"
  string agent_id = 2;              // @gotag: json:"agentId"
  string employer_username = 3;     // @gotag: json:"employerUsername"
}
