syntax = "proto3";

package reverse_rpc;
option go_package = "sico-backend/internal/transport/reverse_grpc/pb/conversation/reverse_rpc";

import "conversation/msg.proto";

service ReverseConversationRPC {

    rpc RpcCreateMessage(CreateMessageRequest) returns (CreateMessageResponse) {}
    rpc RpcListUserMessageByUserAgentTurnID(ListUserMessageByUserAgentTurnIDRequest) returns (ListUserMessageByUserAgentTurnIDResponse) {}
    rpc RpcUpdateConversationTitle(UpdateConversationTitleRequest) returns (UpdateConversationTitleResponse) {}

}

message CreateMessageRequest {
    msg.Message message = 1; // @gotag: json:"message"
}

message CreateMessageData {
    int64 id = 1;                       // @gotag: json:"id"
}

message CreateMessageResponse {
    CreateMessageData data = 1; // @gotag: json:"data"
    int32 code = 253;       // @gotag: json:"code"
    string msg = 254;     // @gotag: json:"msg"
}

message ListUserMessageByUserAgentTurnIDRequest {
    int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId"
    int64 turn_id = 2; // @gotag: json:"turnId"
    string username = 3; // @gotag: json:"username"
}

message ListUserMessageByUserAgentTurnIDResponse {
    repeated msg.Message data = 1; // @gotag: json:"data"
    int32 code = 253;     // @gotag: json:"code"
    string msg = 254;     // @gotag: json:"msg"
}

message UpdateConversationTitleRequest {
    int64 conversation_id = 1; // @gotag: json:"conversationId"
    string title = 2; // @gotag: json:"title"
}

message UpdateConversationTitleResponse {
    int32 code = 253;     // @gotag: json:"code"
    string msg = 254;     // @gotag: json:"msg"
}
