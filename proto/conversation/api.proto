syntax = "proto3";
package api;

option go_package = "sico-backend/internal/transport/http/dto/conversation";

import "conversation/msg.proto";
import "conversation/plan.proto";
import "conversation/chat.proto";
import "conversation/conversation.proto";
import "common/common.proto";

message ChatRequest {
  string username = 1;             // @gotag: json:"username,omitempty"
  chat.ChatContent message = 2;         // @gotag: json:"message,omitempty"
  string agent_id = 4;             // @gotag: json:"agentId,omitempty"
  repeated int64 workflow_ids = 5; // @gotag: json:"workflowIds,omitempty"
  string system_prompt = 6;        // @gotag: json:"systemPrompt,omitempty"
  int64 turn_id = 7;               // @gotag: json:"turnId,omitempty"
  int64 conversation_id = 8;       // @gotag: json:"conversationId,omitempty"
  int64 agent_instance_id = 9;     // @gotag: json:"agentInstanceId,omitempty"
  string agent_name = 10;          // @gotag: json:"agentName,omitempty"
  string agent_instance_name = 11; // @gotag: json:"agentInstanceName,omitempty"
  repeated common.Attachment agent_attachments = 12; // @gotag: json:"agentAttachments,omitempty"
  int64 project_id = 13;           // @gotag: json:"projectId,omitempty"
  string model = 14;               // @gotag: json:"model,omitempty"
  string agent_role = 15;          // @gotag: json:"agentRole,omitempty"
  string project_name = 16;         // @gotag: json:"projectName,omitempty"
}

message ChatDirectResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}


message ListMessagesByUserAndAgentRequest {
  int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId", binding:"required", form:"agentInstanceId"
  string agent_id = 2; // @gotag: json:"agentId", form:"agentId"
  int32 page = 3; // @gotag: json:"page" form:"page" binding:"min=1" default:"1"
  int32 page_size = 4; // @gotag: json:"pageSize" form:"pageSize" binding:"min=1,max=50" default:"10"
  optional int64 turn_id = 5; // @gotag: json:"turnId,omitempty" form:"turnId"
}

message ListMessagesByUserAndAgentData {
  repeated msg.MessageItem messages = 1; // @gotag: json:"messages"
  bool has_more = 2; // @gotag: json:"hasMore"
}

message ListMessagesByUserAndAgentResponse {
  ListMessagesByUserAndAgentData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message GetUserMessageByUserAgentTurnIDRequest {
  int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId", binding:"required", form:"agentInstanceId"
  string agent_id = 2; // @gotag: json:"agentId", form:"agentId"
  int64 turn_id = 3; // @gotag: json:"turnId", binding:"required", form:"turnId"
}

message GetUserMessageByUserAgentTurnIDResponse {
  optional msg.MessageItem data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}


message UpdateConversationRequest {
  int64 id = 1; // @gotag: json:"id", binding:"required"
  map<string, string> meta_data = 2; // @gotag: json:"metaData"
  string title = 3; // @gotag: json:"title"
  int32 status = 4; // @gotag: json:"status"
}

message UpdateConversationResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ListConversationRequest {
  int32 page = 1;         // @gotag: json:"page" form:"page" binding:"min=0" default:"1"
  int32 page_size = 2;    // @gotag: json:"pageSize" form:"pageSize" binding:"min=1,max=100" default:"10"
}

message ListConversationResponse {
  ListConversationData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ListConversationData {
  repeated conversation.ConversationData conversations = 1; // @gotag: json:"conversations"
  bool has_more = 2; // @gotag: json:"hasMore"
}

message GetConversationRequest {
  int64 id = 1;         // @gotag: form:"id" binding:"required"
}

message GetConversationResponse {
  GetConversationData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message GetConversationData {
  conversation.ConversationData conversation = 1; // @gotag: json:"conversation"
}

message ListConversationStatusCountRequest {
  string agent_id = 1; // @gotag: json:"agentId" form:"agentId"
  int64 agent_instance_id = 5; // @gotag: json:"agentInstanceId" form:"agentInstanceId"
}

message ListConversationStatusCountResponse {
  ListConversationStatusCountData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

message ListConversationStatusCountData {
  map<int32, int64> status_count_map = 1; // @gotag: json:"statusCountMap"
}

message GetPlanRequest {
  int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId,omitempty" form:"agentInstanceId"
  string username = 2; // @gotag: json:"-,omitempty" form:"-"
  int64 turn_id = 3; // @gotag: json:"turnId,omitempty" form:"turnId"
}

message GetPlanData {
  plan.Plan plan = 1; // @gotag: json:"plan,omitempty"
  plan.PlanStatus status = 2; // @gotag: json:"status,omitempty"
}

message GetPlanResponse {
  GetPlanData data = 1; // @gotag: json:"data,omitempty"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg,omitempty"
}

message CancelPlanRequest {
  int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId,omitempty" form:"agentInstanceId"
  string username = 2; // @gotag: json:"-,omitempty" form:"-"
  int64 turn_id = 3; // @gotag: json:"turnId,omitempty" form:"turnId"
}

message CancelPlanResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg,omitempty"
}


message GenerateOnboardRoleScopeResponse {
  string role_scope = 1; // @gotag: json:"roleScope,omitempty"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg,omitempty"
}

message GenerateOnboardRecommendationTasksRequest {
  int64 agent_instance_id = 1; // @gotag: json:"agentInstanceId" binding:"required"
  string username = 2; // @gotag: json:"-,omitempty"
  int64 project_id = 3; // @gotag: json:"-,omitempty"
  string agent_id = 4; // @gotag: json:"-,omitempty"
}

enum RecommendationTaskIcon {
  RECOMMENDATION_TASK_ICON_UNKNOWN = 0;
  RECOMMENDATION_TASK_ICON_FALLBACK = 1;
  RECOMMENDATION_TASK_ICON_BUILD = 2;
  RECOMMENDATION_TASK_ICON_THINK = 3;
  RECOMMENDATION_TASK_ICON_WRITE = 4;
  RECOMMENDATION_TASK_ICON_RESEARCH = 5;
}

message RecommendationTask {
  string message = 1; // @gotag: json:"message,omitempty"
  RecommendationTaskIcon icon = 2; // @gotag: json:"icon,omitempty"
}

message GenerateOnboardRecommendationTasksData {
  repeated RecommendationTask tasks = 1; // @gotag: json:"tasks,omitempty"
}

message GenerateOnboardRecommendationTasksResponse {
  GenerateOnboardRecommendationTasksData data = 1; // @gotag: json:"data,omitempty"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg,omitempty"
}
