syntax = "proto3";
package conversation;

option go_package = "sico-backend/internal/transport/http/dto/conversation";

message AgentInstanceInfo {
  string name = 1; // @gotag: json:"name"
  string desc = 2; // @gotag: json:"desc"
  string role = 3; // @gotag: json:"role"
  string icon_uri = 4; // @gotag: json:"iconUri"
  int64 instance_id = 8; // @gotag: json:"instanceId"
}

message ConversationData {
  int64 id = 1;  // @gotag: json:"id"
  int64 created_at = 2; // @gotag: json:"createdAt"
  map<string, string> meta_data = 3; // @gotag: json:"metaData"
  string creator_username = 4; // @gotag: json:"creatorUsername"
  string title = 5; // @gotag: json:"title"
  string last_section_id = 6; // @gotag: json:"lastSectionId"
  AgentInstanceInfo agent_instance_info = 8; // @gotag: json:"agentInstanceInfo,omitempty"
}

message ConversationListItem {
  int64 id = 1;  // @gotag: json:"id"
  int64 created_at = 2; // @gotag: json:"createdAt"
  string creator_username = 3; // @gotag: json:"creatorUsername"
  string title = 4; // @gotag: json:"title"
}

message CreateConversationRequest {
  string title = 1; // @gotag: json:"title"
  int64 agent_instance_id = 2; // @gotag: json:"agentInstanceId" binding:"required"
}

message CreateConversationResponse {
  ConversationData data = 1; // @gotag: json:"data"
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}
