syntax = "proto3";

package chat;

option go_package = "sico-backend/internal/transport/http/dto/conversation";

import "google/protobuf/struct.proto";
import "common/common.proto";

message ChatContent {
  ChatContentType type = 1; // @gotag: json:"type,omitempty"
  string content = 2; // @gotag: json:"content,omitempty"
  FunctionContext function_context = 3; // @gotag: json:"functionContext,omitempty"
  repeated common.Attachment attachments = 4; // @gotag: json:"attachments,omitempty"
}

message FunctionContext {
  int64 workflow_id = 1; // @gotag: json:"workflowId,omitempty"
  int64 workflow_execution_id = 2; // @gotag: json:"workflowExecutionId,omitempty"
  string workflow_name = 3; // @gotag: json:"workflowName,omitempty"
  google.protobuf.Struct arguments = 4; // @gotag: json:"arguments,omitempty"
  string result = 5; // @gotag: json:"result,omitempty"
  string exception = 6; // @gotag: json:"exception,omitempty"
}

enum ChatContentType {
  CHAT_CONTENT_TYPE_UNKNOWN = 0;
  CHAT_CONTENT_TYPE_TEXT = 1;
  CHAT_CONTENT_TYPE_FUNCTION_CALL = 2;
  CHAT_CONTENT_TYPE_FUNCTION_RESULT = 3;
  CHAT_CONTENT_TYPE_TRAIN_CONTEXT = 4;
  CHAT_CONTENT_TYPE_END = 5;
  CHAT_CONTENT_TYPE_PLAYBOOK_INGESTION = 6;
  CHAT_CONTENT_TYPE_PLAN = 7;
  CHAT_CONTENT_TYPE_KEEPALIVE = 8;
  CHAT_CONTENT_TYPE_ERROR = 9;
}

message ChatResponse {
  ChatContent content = 1; // @gotag: json:"content,omitempty"
  int64 timestamp = 2; // @gotag: json:"timestamp,omitempty"
  bool is_final = 3; // @gotag: json:"isFinal,omitempty"
  bool is_internal = 4; // @gotag: json:"isInternal,omitempty"
}

message TopicMessage {
  int64 conversation_id = 1; // @gotag: json:"conversationId,omitempty"
  int64 turn_id = 2; // @gotag: json:"turnId,omitempty"
  int64 seq = 3; // @gotag: json:"seq,omitempty"
  ChatResponse chat_response = 4; // @gotag: json:"chatResponse,omitempty"
}
