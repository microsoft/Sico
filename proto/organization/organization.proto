syntax = "proto3";
package organization;

option go_package = "sico-backend/internal/transport/http/dto/organization";

message Organization {
  int64 id = 1;             // @gotag: json:"id"
  string name = 2;          // @gotag: json:"name"
  string description = 3;   // @gotag: json:"description"
  int64 created_at = 4;     // @gotag: json:"createdAt"
  int64 updated_at = 5;     // @gotag: json:"updatedAt"
}

message CreateOrganizationRequest {
  string name = 1;          // @gotag: json:"name" binding:"required,min=1,max=256"
  string description = 2;   // @gotag: json:"description" binding:"max=2000"
}
message CreateOrganizationResponseData {
  int64 id = 1;             // @gotag: json:"id"
}
message CreateOrganizationResponse {
  CreateOrganizationResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                        // @gotag: json:"code"
  string msg = 254;                        // @gotag: json:"msg"
}

message UpdateOrganizationRequest {
  int64 id = 1;             // @gotag: json:"id" binding:"required"
  string name = 2;          // @gotag: json:"name" binding:"omitempty,min=1,max=256"
  string description = 3;   // @gotag: json:"description" binding:"max=2000"
}
message UpdateOrganizationResponse {
  int32 code = 253;         // @gotag: json:"code"
  string msg = 254;         // @gotag: json:"msg"
}

message DeleteOrganizationRequest {
  int64 id = 1;             // @gotag: form:"id" binding:"required"
}
message DeleteOrganizationResponse {
  int32 code = 253;         // @gotag: json:"code"
  string msg = 254;         // @gotag: json:"msg"
}

message GetOrganizationRequest {
  int64 id = 1;             // @gotag: form:"id" binding:"required"
}
message GetOrganizationResponseData {
  Organization organization = 1; // @gotag: json:"organization"
}
message GetOrganizationResponse {
  GetOrganizationResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                     // @gotag: json:"code"
  string msg = 254;                     // @gotag: json:"msg"
}

message ListOrganizationsRequest {
  string name = 1;          // @gotag: form:"name" binding:"max=256"
  int32 page = 2;           // @gotag: form:"page" binding:"min=1" default:"1"
  int32 page_size = 3;      // @gotag: form:"pageSize" binding:"min=1,max=100" default:"10"
}
message ListOrganizationsResponseData {
  repeated Organization organizations = 1; // @gotag: json:"organizations"
  int32 total = 2;                          // @gotag: json:"total"
  bool has_next = 3;                        // @gotag: json:"hasNext"
}
message ListOrganizationsResponse {
  ListOrganizationsResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                       // @gotag: json:"code"
  string msg = 254;                       // @gotag: json:"msg"
}
