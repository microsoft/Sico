syntax = "proto3";
package common;

option go_package = "sico-backend/internal/transport/http/dto/rbac/common";

message User {
  int64 id = 1;                 // @gotag: json:"id"
  string alias = 2;             // @gotag: json:"alias"
  string username = 3;          // @gotag: json:"username"
  string password = 4;          // @gotag: json:"-"
  string email = 5;             // @gotag: json:"email"
  string tenant = 6;            // @gotag: json:"tenant"
  string phone = 7;             // @gotag: json:"phone"
  string icon_uri = 8;          // @gotag: json:"iconUri"
  string raw_icon_uri = 9;      // @gotag: json:"rawIconUri"
  UserStatus status = 10;       // @gotag: json:"status"
  string description = 11;      // @gotag: json:"description"
  repeated UserRoleInfo roles = 12;   // @gotag: json:"roles"
  int64 created_at = 13;        // @gotag: json:"createdAt"
  int64 updated_at = 14;        // @gotag: json:"updatedAt"
}

message UserRoleInfo {
  int64 id = 1;              // @gotag: json:"id"
  string role_code = 2;      // @gotag: json:"roleCode"
  string scope_type = 3;     // @gotag: json:"scopeType"
  int64 scope_id = 4;        // @gotag: json:"scopeId"
}

enum UserStatus {
  USER_STATUS_INACTIVE = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_FROZEN = 2;
}
