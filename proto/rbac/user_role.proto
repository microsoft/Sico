syntax = "proto3";
package user_role;

option go_package = "sico-backend/internal/transport/http/dto/rbac/user_role";

import "rbac/role.proto";
import "rbac/rbac_common.proto";

// UserRole assignment view
message UserRole {
  int64 id = 1;            // @gotag: json:"id"
  int64 user_id = 2;       // @gotag: json:"userId"
  int64 role_id = 3;       // @gotag: json:"roleId"
  int64 created_at = 4;    // @gotag: json:"createdAt"
  int64 updated_at = 5;    // @gotag: json:"updatedAt"
  role.Role role = 6;      // @gotag: json:"role"
  common.User user = 7;    // @gotag: json:"user"
}

// Assign role to user
message AssignUserRoleRequest {
  int64 user_id = 1; // @gotag: json:"userId" binding:"required"
  int64 role_id = 2; // @gotag: json:"roleId" binding:"required"
}
message AssignUserRoleResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

// Remove role from user
message RemoveUserRoleRequest {
  int64 user_id = 1; // @gotag: json:"userId" binding:"required"
  int64 role_id = 2; // @gotag: json:"roleId" binding:"required"
}
message RemoveUserRoleResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

// List roles of user
message ListUserRolesRequest {
  int64 user_id = 1; // @gotag: form:"userId" binding:"required"
  int32 page = 2;    // @gotag: form:"page" binding:"min=1" default:"1"
  int32 page_size = 3; // @gotag: form:"pageSize" binding:"min=1,max=100" default:"10"
}
message ListUserRolesResponseData {
  repeated role.Role roles = 1; // @gotag: json:"roles"
  int32 total = 2;              // @gotag: json:"total"
  bool has_next = 3;            // @gotag: json:"hasNext"
}
message ListUserRolesResponse {
  ListUserRolesResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                  // @gotag: json:"code"
  string msg = 254;                  // @gotag: json:"msg"
}

// List users by role
message ListUsersByRoleRequest {
  int64 role_id = 1; // @gotag: form:"roleId" binding:"required"
  int32 page = 2;    // @gotag: form:"page" binding:"min=1" default:"1"
  int32 page_size = 3; // @gotag: form:"pageSize" binding:"min=1,max=100" default:"10"
}
message ListUsersByRoleResponseData {
  repeated common.User users = 1; // @gotag: json:"users"
  int32 total = 2;                // @gotag: json:"total"
  bool has_next = 3;              // @gotag: json:"hasNext"
}
message ListUsersByRoleResponse {
  ListUsersByRoleResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                     // @gotag: json:"code"
  string msg = 254;                     // @gotag: json:"msg"
}
