syntax = "proto3";
package role;

option go_package = "sico-backend/internal/transport/http/dto/rbac/role";

// Role entity
message Role {
  int64 id = 1;                // @gotag: json:"id"
  string code = 2;             // @gotag: json:"code"
  string name = 3;             // @gotag: json:"name"
  string description = 4;      // @gotag: json:"description"
  int32 status = 5;            // @gotag: json:"status" binding:"omitempty,oneof=0 1" // 1=enabled,0=disabled
  int64 created_at = 6;        // @gotag: json:"createdAt"
  int64 updated_at = 7;        // @gotag: json:"updatedAt"
}

// Create Role
message CreateRoleRequest {
  string code = 1;        // @gotag: json:"code" binding:"required,min=2,max=64"
  string name = 2;        // @gotag: json:"name" binding:"required,min=2,max=128"
  string description = 3; // @gotag: json:"description" binding:"max=1024"
}
message CreateRoleResponseData {
  int64 id = 1; // @gotag: json:"id"
}
message CreateRoleResponse {
  CreateRoleResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                // @gotag: json:"code"
  string msg = 254;                // @gotag: json:"msg"
}

// Update Role
message UpdateRoleRequest {
  int64 id = 1;           // @gotag: json:"id" binding:"required"
  string name = 2;        // @gotag: json:"name" binding:"omitempty,min=2,max=128"
  string description = 3; // @gotag: json:"description" binding:"max=1024"
  int32 status = 4;       // @gotag: json:"status" binding:"omitempty,oneof=0 1"
}
message UpdateRoleResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

// Delete Role
message DeleteRoleRequest {
  int64 id = 1; // @gotag: form:"id" binding:"required"
}
message DeleteRoleResponse {
  int32 code = 253; // @gotag: json:"code"
  string msg = 254; // @gotag: json:"msg"
}

// Get Role
message GetRoleRequest {
  int64 id = 1; // @gotag: form:"id" binding:"required"
}
message GetRoleResponseData {
  Role role = 1; // @gotag: json:"role"
}
message GetRoleResponse {
  GetRoleResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;             // @gotag: json:"code"
  string msg = 254;             // @gotag: json:"msg"
}

// Query Roles
message QueryRolesRequest {
  string code = 1;        // @gotag: form:"code" binding:"max=64"
  string name = 2;        // @gotag: form:"name" binding:"max=128"
  int32 status = 3;       // @gotag: form:"status" binding:"omitempty,oneof=0 1"
  int32 page = 4;         // @gotag: form:"page" binding:"min=1" default:"1"
  int32 page_size = 5;    // @gotag: form:"pageSize" binding:"min=1,max=100" default:"10"
}
message QueryRolesResponseData {
  repeated Role roles = 1; // @gotag: json:"roles"
  int32 total = 2;         // @gotag: json:"total"
  bool has_next = 3;       // @gotag: json:"hasNext"
}
message QueryRolesResponse {
  QueryRolesResponseData data = 1; // @gotag: json:"data"
  int32 code = 253;                // @gotag: json:"code"
  string msg = 254;                // @gotag: json:"msg"
}
