<svg xmlns="http://www.w3.org/2000/svg" width="186" height="146" viewBox="0 0 186 146" fill="none">
  <title>No projects</title>
  <defs>
    <linearGradient id="empty-iconbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2F0FE"/>
      <stop offset="100%" stop-color="#FEFDFF"/>
    </linearGradient>
    <mask id="empty-fade" maskUnits="userSpaceOnUse" x="14" y="10" width="157" height="115">
      <linearGradient id="empty-fade-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
        <stop offset="40%" stop-color="#fff" stop-opacity="0.9"/>
        <stop offset="100%" stop-color="#fff" stop-opacity="0.7"/>
      </linearGradient>
      <rect x="14" y="10" width="157" height="115" fill="url(#empty-fade-grad)"/>
    </mask>
  </defs>

  <!-- Two ghost cards behind, narrower than foreground -->
  <g mask="url(#empty-fade)">
    <!-- Ghost card 1 (top) -->
    <g transform="translate(14 10)">
      <rect width="157" height="50" rx="8" fill="#fff" stroke="#0E10141A" stroke-width="0.5"/>
      <rect x="8" y="8" width="34" height="34" rx="6" fill="#D8DBDF" fill-opacity="0.4"/>
      <rect x="50" y="14" width="99" height="10" rx="5" fill="#F3F4F6"/>
      <rect x="50" y="32" width="53" height="10" rx="5" fill="#F3F4F6"/>
    </g>
    <!-- Ghost card 2 (bottom) -->
    <g transform="translate(14 75)" opacity="0.85">
      <rect width="157" height="50" rx="8" fill="#fff" stroke="#0E10141A" stroke-width="0.5"/>
      <rect x="8" y="8" width="34" height="34" rx="6" fill="#D8DBDF" fill-opacity="0.4"/>
      <rect x="50" y="14" width="99" height="10" rx="5" fill="#E7EBEF"/>
      <rect x="50" y="32" width="53" height="10" rx="5" fill="#F3F4F6"/>
    </g>
  </g>

  <!-- Foreground card — full width, vertically centered over ghosts -->
  <g transform="translate(0 45)" filter="drop-shadow(0 2px 8px rgba(17,24,39,0.08)) drop-shadow(0 1px 2px rgba(17,24,39,0.05))">
    <rect width="186" height="56" rx="8" fill="#fff" stroke="#0E10141A" stroke-width="0.5"/>
    <!-- Icon container -->
    <g transform="translate(8 8)">
      <rect width="40" height="40" rx="6" fill="url(#empty-iconbg)" stroke="#E9E8FF" stroke-width="0.5"/>
      <!-- Folder glyph -->
      <path d="M14 17 h5 l2 2 h9 a2 2 0 0 1 2 2 v6 a2 2 0 0 1 -2 2 h-16 a2 2 0 0 1 -2 -2 v-8 a2 2 0 0 1 2 -2 z"
            fill="#EDEBFF" stroke="#6863F6" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <!-- Text bars -->
    <rect x="58" y="18" width="107" height="10" rx="5" fill="#DDDBFF"/>
    <rect x="58" y="34" width="53" height="10" rx="5" fill="#F5F3FF"/>
  </g>
</svg>
