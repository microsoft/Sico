# SPA-only nginx config served from inside the frontend container.
# The upstream nginx (deploy/docker or deploy/kind) is responsible for
# proxying /api/, /storage/, etc. to the backend; this server only needs
# to deliver the React static bundle and fall back to index.html so that
# client-side routes (react-router) work on full-page reloads.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Compress text assets on the fly. Vite ships JS/CSS uncompressed from the
    # build, so without this every chunk goes over the wire raw — a needless hit
    # to first paint. level 6 is the standard size/CPU sweet spot. (This server
    # only listens on :80 and terminates no TLS, so HTTP/2 lives at the upstream
    # nginx, not here.)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        application/javascript
        application/json
        application/wasm
        image/svg+xml
        text/css
        text/plain;

    # Long-cache hashed assets emitted by Vite, but never cache index.html.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
