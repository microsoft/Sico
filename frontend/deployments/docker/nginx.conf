# SPA-only nginx config served from inside the frontend container.
# The upstream nginx (deploy/docker or deploy/kind) is responsible for
# proxying /api/, /storage/, etc. to the backend; this server only needs
# to deliver the React static bundle and fall back to index.html so that
# client-side routes (react-router) work on full-page reloads.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Long-cache hashed assets emitted by Vite, but never cache index.html.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
