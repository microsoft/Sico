apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-backend
  labels:
    app: sico-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: sico-backend
  template:
    metadata:
      labels:
        app: sico-backend
    spec:
      # Mirror docker-compose's `depends_on: core: service_healthy` for the
      # backend: block startup until the core gRPC endpoint is reachable so
      # the seeder doesn't race the core service on first boot.
      initContainers:
        - name: wait-for-core
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z sico-core 50053; do
                echo "waiting for sico-core:50053..."
                sleep 2
              done
      containers:
        - name: sico-backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.ports.http }}
            - name: grpc
              containerPort: {{ .Values.service.ports.grpc }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: DB_PASSWORD
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: REDIS_PASSWORD
            # Default sandbox client secret for the `test-client` example flow.
            # The key is created with an empty value when unset, so this is
            # safe even if the operator never configured the sandbox auth.
            - name: SANDBOX_CLIENT_SECRET_TEST_CLIENT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: SANDBOX_CLIENT_SECRET_TEST_CLIENT
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/sico/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
