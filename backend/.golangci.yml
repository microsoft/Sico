version: "2"

linters:
  default: standard
  enable:
    - funlen
    - lll
    - gocyclo
    - gocognit
    - nestif
  disable:
    - unused
  settings:
    funlen:
      lines: 100
      statements: 60
      ignore-comments: true
    lll:
      line-length: 130
      # Go convention (gofmt, go/printer, go doc) renders tabs as 8 columns.
      # Using 8 here matches how lines appear in GitHub diffs and terminals.
      tab-width: 8
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 5
  exclusions:
    generated: lax
    rules:
      # Tests often have long table-driven cases; relax size rules.
      - path: _test\.go
        linters:
          - funlen
          - gocyclo
          - gocognit
          - nestif
      # Generated code: protobuf stubs, HTTP DTOs, wire_gen.
      - path: internal/transport/grpc/pb/
        linters: [funlen, lll, gocyclo, gocognit, nestif]
      - path: internal/transport/reverse_grpc/pb/
        linters: [funlen, lll, gocyclo, gocognit, nestif]
      - path: internal/transport/http/dto/
        linters: [funlen, lll, gocyclo, gocognit, nestif]
      - path: wire_gen\.go
        linters: [funlen, lll, gocyclo, gocognit, nestif]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
