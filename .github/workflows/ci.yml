name: CI — Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate OpenAPI docs
        run: make openapi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11
          working-directory: backend

  core-lint:
    name: Core Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        working-directory: core
        run: ruff check .

      - name: Run ruff on examples
        working-directory: core
        run: ruff check ../examples --config pyproject.toml

      - name: Compile examples
        run: python -m compileall -q examples

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Detect frontend source package
        id: frontend
        run: |
          if [[ -f frontend/package.json ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "frontend/package.json is not included in this public checkout; skipping frontend lint because the frontend source package is distributed separately."
          fi

      - name: Install pnpm
        if: steps.frontend.outputs.present == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        if: steps.frontend.outputs.present == 'true'
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.frontend.outputs.present == 'true'
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run eslint
        if: steps.frontend.outputs.present == 'true'
        working-directory: frontend
        run: pnpm lint

  license-check:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit (all files)
        run: pre-commit run --all-files --show-diff-on-failure

  tests:
    uses: ./.github/workflows/tests.yml
