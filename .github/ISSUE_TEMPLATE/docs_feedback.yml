name: Documentation feedback
description: Report confusing, missing, or outdated documentation.
title: "docs: "
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: input
    id: page
    attributes:
      label: Page or file
      description: Link the page, or provide the repo path.
      placeholder: docs/quickstart.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is confusing, missing, or outdated?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Share the wording, example, or structure you expected.
    validations:
      required: false
  - type: dropdown
    id: audience
    attributes:
      label: Reader type
      options:
        - New user running Sico locally
        - Contributor developing Sico
        - Operator deploying Sico
        - Maintainer
        - Not sure
    validations:
      required: false
