name: Bug report
description: Report a reproducible problem in Sico.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Sico. For security vulnerabilities, please do not open a public issue; follow SECURITY.md instead.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This is not a security vulnerability.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Core
        - Frontend packaging
        - Proto or generated code
        - Sandbox or emulator
        - Deployment, Docker, or Helm
        - Documentation or examples
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, deployment mode, commit SHA or version, and any relevant service versions.
      placeholder: macOS 15, Docker Compose, commit abc123, Go 1.25, Python 3.13
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest sequence of steps that triggers the problem.
      placeholder: |
        1. Run `make compose-up`
        2. Open ...
        3. Send request ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs, stack traces, screenshots, or API responses when useful. Remove secrets first.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected, how often it happens, and whether there is a workaround.
    validations:
      required: false
