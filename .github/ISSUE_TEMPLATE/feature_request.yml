name: Feature request
description: Propose a new capability or behavior change.
title: "feat: "
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request describes a concrete user or operator need.
          required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Backend
        - Core
        - Frontend packaging
        - LLM Hub
        - Sandbox or emulator
        - Deployment, Docker, or Helm
        - Documentation or examples
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What workflow is blocked, inefficient, or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior, API, UI, or operator workflow.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention workarounds or other designs you considered.
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility and rollout notes
      description: Note migrations, config changes, docs, or breaking-change concerns.
    validations:
      required: false
