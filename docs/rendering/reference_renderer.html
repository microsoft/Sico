<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ToolCall reference renderer</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #fff; --border: #e2e5ea; --muted: #6b7280;
    --blue: #2563eb; --green: #16a34a; --red: #dc2626; --amber: #d97706;
    --text: #111827;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         background: var(--bg); color: var(--text); }
  header { padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); }
  header h1 { margin: 0 0 4px; font-size: 16px; }
  header p { margin: 0; color: var(--muted); font-size: 12px; }
  main { display: grid; grid-template-columns: 360px 1fr; gap: 16px; padding: 16px 20px; align-items: start; }
  @media (max-width: 880px) { main { grid-template-columns: 1fr; } }
  .panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .panel h2 { margin: 0 0 10px; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); }
  textarea { width: 100%; height: 200px; resize: vertical; font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, monospace;
             border: 1px solid var(--border); border-radius: 8px; padding: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 10px; }
  button, .file-label { background: var(--blue); color: #fff; border: 0; border-radius: 8px; padding: 8px 12px;
           font-size: 13px; cursor: pointer; }
  button.secondary, .file-label { background: #eef2ff; color: var(--blue); }
  .file-label input { display: none; }
  .err { color: var(--red); margin-top: 8px; white-space: pre-wrap; font: 12px/1.4 ui-monospace, monospace; }
  .hint { color: var(--muted); font-size: 12px; }

  /* ToolCall card */
  .tc { border: 1px solid var(--border); border-radius: 12px; background: var(--card); margin-bottom: 14px; overflow: hidden; }
  .tc-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .tc-title { font-weight: 600; }
  .tc-sub { color: var(--muted); font-size: 12px; }
  .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px; border: 1px solid transparent; }
  .badge.running { background: #eff6ff; color: var(--blue); border-color: #bfdbfe; }
  .badge.success { background: #f0fdf4; color: var(--green); border-color: #bbf7d0; }
  .badge.failed  { background: #fef2f2; color: var(--red); border-color: #fecaca; }
  .badge.neutral { background: #f3f4f6; color: var(--muted); border-color: var(--border); }
  .tc-body { padding: 12px 14px; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 4px 0 6px; }

  ul.timeline { list-style: none; margin: 0 0 10px; padding: 0; }
  ul.timeline li { display: flex; gap: 8px; align-items: baseline; padding: 3px 0; }
  .ic { width: 16px; text-align: center; flex: 0 0 16px; }
  .ic.done { color: var(--green); } .ic.running { color: var(--blue); }
  .ic.failed { color: var(--red); } .ic.pending { color: var(--muted); } .ic.cancelled { color: var(--amber); }

  .kv { display: grid; grid-template-columns: max-content 1fr; gap: 2px 10px; margin: 6px 0; }
  .kv .k { color: var(--muted); }
  .kv .v { word-break: break-word; }

  .deliverable { border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 8px 0; background: #fbfcfe; }
  .deliverable h4 { margin: 0 0 6px; font-size: 13px; }
  .deliverable pre { background: #0f172a; color: #e2e8f0; padding: 10px; border-radius: 6px; overflow: auto; font-size: 12px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--border);
          border-radius: 8px; text-decoration: none; color: var(--blue); background: #fff; }
  .sandbox { display: grid; grid-template-columns: max-content 1fr; gap: 2px 10px; }
  .sandbox .k { color: var(--muted); }
  details.legacy { margin-top: 10px; }
  details.legacy summary { cursor: pointer; color: var(--amber); font-size: 12px; }
  details.legacy .msg { color: var(--muted); white-space: pre-wrap; margin-top: 6px; font-size: 12px; }
  .nested { margin-left: 8px; border-left: 2px solid var(--border); padding-left: 12px; }
  .md h2, .md h3 { margin: 8px 0 4px; }
  .md code { background: #eef2ff; padding: 1px 4px; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <h1>ToolCall reference renderer</h1>
  <p>Reference implementation of the structured rendering contract
     (<code>docs/rendering/tool_call_contract.md</code>). Load an example or paste a ToolCall JSON.</p>
</header>
<main>
  <section class="panel">
    <h2>Input</h2>
    <textarea id="input" placeholder="Paste a ToolCall JSON here..."></textarea>
    <div class="row">
      <button id="render">Render</button>
      <label class="file-label">Load JSON file
        <input id="file" type="file" accept="application/json,.json" />
      </label>
    </div>
    <p class="hint">Examples live in <code>docs/rendering/examples/</code>. Pick one with “Load JSON file”.</p>
    <div id="err" class="err"></div>
  </section>
  <section class="panel">
    <h2>Rendered output</h2>
    <div id="out"></div>
  </section>
</main>

<script>
"use strict";

// --- enum tolerance: accept int value or proto name -------------------------
const TOOL_CALL_STATUS = {
  0: "UNKNOWN", 1: "RUNNING", 2: "FAILED", 3: "SUCCESSFUL", 4: "FAILED_ANALYZING",
  5: "FAILED_ANALYZED", 6: "RETRY_RUNNING", 7: "RETRY_SUCCESSFUL", 8: "RETRY_FAILED",
};
const ITEM_STATUS = { 0: "UNKNOWN", 1: "PENDING", 2: "RUNNING", 3: "DONE", 4: "FAILED", 5: "CANCELLED" };
const DELIVERABLE_TYPE = { 0: "UNKNOWN", 1: "MARKDOWN", 2: "FILE", 3: "WEB_PREVIEW_URL", 5: "ACQUIRED_SANDBOX" };

function enumName(map, value) {
  if (value === undefined || value === null) return "UNKNOWN";
  if (typeof value === "string") return value.toUpperCase();
  return map[value] || "UNKNOWN";
}

function statusBadgeClass(name) {
  if (["RUNNING", "RETRY_RUNNING", "FAILED_ANALYZING"].includes(name)) return "running";
  if (["SUCCESSFUL", "RETRY_SUCCESSFUL"].includes(name)) return "success";
  if (["FAILED", "RETRY_FAILED", "FAILED_ANALYZED"].includes(name)) return "failed";
  return "neutral";
}

const ITEM_ICON = { DONE: ["✓", "done"], RUNNING: ["◐", "running"], FAILED: ["✗", "failed"],
                    PENDING: ["○", "pending"], CANCELLED: ["–", "cancelled"], UNKNOWN: ["·", "pending"] };

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// minimal markdown: code fences, headings, bold, inline code, line breaks
function miniMarkdown(src) {
  const parts = String(src || "").split(/```/);
  let html = "";
  parts.forEach((chunk, i) => {
    if (i % 2 === 1) { html += "<pre>" + esc(chunk.replace(/^\n/, "")) + "</pre>"; return; }
    let t = esc(chunk)
      .replace(/^### (.*)$/gm, "<h3>$1</h3>")
      .replace(/^## (.*)$/gm, "<h2>$1</h2>")
      .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\n/g, "<br/>");
    html += t;
  });
  return html;
}

function el(html) { const d = document.createElement("div"); d.innerHTML = html.trim(); return d.firstChild; }

function renderTimeline(items) {
  if (!items || !items.length) return "";
  const rows = items.map((it) => {
    const name = enumName(ITEM_STATUS, it.status);
    const [glyph, cls] = ITEM_ICON[name] || ITEM_ICON.UNKNOWN;
    return `<li><span class="ic ${cls}">${glyph}</span><span>${esc(it.name)}</span></li>`;
  }).join("");
  return `<div class="section-label">Progress</div><ul class="timeline">${rows}</ul>`;
}

function renderDisplay(display) {
  const keys = display ? Object.keys(display) : [];
  if (!keys.length) return "";
  const rows = keys.map((k) => `<div class="k">${esc(k)}</div><div class="v">${esc(display[k])}</div>`).join("");
  return `<div class="section-label">Details</div><div class="kv">${rows}</div>`;
}

function renderDeliverable(d) {
  const type = enumName(DELIVERABLE_TYPE, d.type);
  if (type === "MARKDOWN") {
    const title = d.markdownTitle ? `<h4>${esc(d.markdownTitle)}</h4>` : "";
    return `<div class="deliverable">${title}<div class="md">${miniMarkdown(d.markdownContent)}</div></div>`;
  }
  if (type === "FILE") {
    return `<div class="deliverable"><a class="chip" href="${esc(d.fileUrl)}">⬇ ${esc(d.fileName || d.fileUrl)}</a></div>`;
  }
  if (type === "WEB_PREVIEW_URL") {
    return `<div class="deliverable"><a class="chip" href="${esc(d.webPreviewSasUrl)}" target="_blank" rel="noopener">↗ Open web preview</a></div>`;
  }
  if (type === "ACQUIRED_SANDBOX") {
    const s = d.acquiredSandbox || {};
    const link = s.vncUrl ? `<a class="chip" href="${esc(s.vncUrl)}" target="_blank" rel="noopener">↗ Open live view</a>` : "";
    return `<div class="deliverable"><h4>${esc(s.displayName || "Sandbox")}</h4>
      <div class="sandbox">
        <div class="k">type</div><div>${esc(s.sandboxType)}</div>
        <div class="k">device</div><div>${esc(s.deviceId)}</div>
        <div class="k">endpoint</div><div>${esc(s.endpoint)}</div>
        <div class="k">id</div><div>${esc(s.sandboxId)}</div>
      </div>${link}</div>`;
  }
  return "";
}

function renderToolCall(tc, nested) {
  const statusName = enumName(TOOL_CALL_STATUS, tc.toolCallStatus);
  const sub = (tc.executionInfo && tc.executionInfo.builtinToolName) || "";
  const deliverables = (tc.deliverables || []).map(renderDeliverable).join("");
  const children = (tc.batchCalls || [])
    .slice()
    .sort((a, b) => (a.batchItemIndex || 0) - (b.batchItemIndex || 0))
    .map((c) => renderToolCall(c, true).outerHTML).join("");
  const legacy = tc.message
    ? `<details class="legacy"><summary>Legacy prose (deprecated — do not parse)</summary><div class="msg">${esc(tc.message)}</div></details>`
    : "";
  const card = el(`<div class="tc">
    <div class="tc-head">
      <span class="tc-title">${esc(tc.toolName || "tool")}</span>
      ${sub ? `<span class="tc-sub">${esc(sub)}</span>` : ""}
      <span style="flex:1"></span>
      <span class="badge ${statusBadgeClass(statusName)}">${esc(statusName)}</span>
    </div>
    <div class="tc-body">
      ${renderTimeline(tc.runningList)}
      ${renderDisplay(tc.display)}
      ${deliverables ? `<div class="section-label">Deliverables</div>${deliverables}` : ""}
      ${children ? `<div class="section-label">Batch (${(tc.batchCalls || []).length})</div><div class="nested">${children}</div>` : ""}
      ${legacy}
    </div>
  </div>`);
  if (nested) card.classList.add("nested-card");
  return card;
}

function render() {
  const errEl = document.getElementById("err");
  const out = document.getElementById("out");
  errEl.textContent = "";
  out.innerHTML = "";
  let data;
  try {
    data = JSON.parse(document.getElementById("input").value);
  } catch (e) {
    errEl.textContent = "Invalid JSON: " + e.message;
    return;
  }
  try {
    out.appendChild(renderToolCall(data, false));
  } catch (e) {
    errEl.textContent = "Render error: " + e.message;
  }
}

document.getElementById("render").addEventListener("click", render);
document.getElementById("file").addEventListener("change", (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = () => { document.getElementById("input").value = reader.result; render(); };
  reader.readAsText(f);
});
</script>
</body>
</html>
