# -- Core ServiceAccount + RBAC for python-sandbox ----------------------------
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sico-core
  namespace: sico
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-pod-manager
  namespace: python-sandbox
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sico-core-sandbox-binding
  namespace: python-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-pod-manager
subjects:
  - kind: ServiceAccount
    name: sico-core
    namespace: sico
---
# -- MySQL (official mysql:8.0) ------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: sico
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-mysql
  namespace: sico
  labels:
    app: sico-mysql
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sico-mysql
  template:
    metadata:
      labels:
        app: sico-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_RANDOM_ROOT_PASSWORD
              value: "1"
            - name: MYSQL_ROOT_HOST
              value: "localhost"
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: sico-credentials
                  key: DB_NAME
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: sico-credentials
                  key: DB_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sico-credentials
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1"]
            initialDelaySeconds: 60
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["SETUID", "SETGID", "CHOWN", "DAC_OVERRIDE", "FOWNER"]
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mysql-data
---
apiVersion: v1
kind: Service
metadata:
  name: sico-mysql
  namespace: sico
spec:
  selector:
    app: sico-mysql
  ports:
    - port: 3306
      targetPort: 3306
---
# -- Redis config (mounted from Secret) ----------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: redis-config
  namespace: sico
type: Opaque
stringData:
  redis.conf: |
    requirepass REDIS_PASSWORD_PLACEHOLDER
---
# -- Redis (official redis:7-alpine) ------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-redis
  namespace: sico
  labels:
    app: sico-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sico-redis
  template:
    metadata:
      labels:
        app: sico-redis
    spec:
      initContainers:
        - name: render-config
          image: redis:7-alpine
          command: ["sh", "-c"]
          args:
            - |
              awk '{
                idx = index($0, "REDIS_PASSWORD_PLACEHOLDER");
                if (idx > 0) print substr($0, 1, idx-1) ENVIRON["REDIS_PASSWORD"] substr($0, idx + 26);
                else print $0;
              }' /tmp/redis-template/redis.conf > /etc/redis/redis.conf
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sico-credentials
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-config-template
              mountPath: /tmp/redis-template
              readOnly: true
            - name: redis-config-rendered
              mountPath: /etc/redis
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "/etc/redis/redis.conf"]
          env:
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: sico-credentials
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: redis-config-rendered
              mountPath: /etc/redis
              readOnly: true
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      volumes:
        - name: redis-config-template
          secret:
            secretName: redis-config
        - name: redis-config-rendered
          emptyDir: {}
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sico-redis
  namespace: sico
spec:
  selector:
    app: sico-redis
  ports:
    - port: 6379
      targetPort: 6379
---
# -- Kafka (KRaft mode, no ZooKeeper) -----------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: sico
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-kafka
  namespace: sico
  labels:
    app: sico-kafka
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sico-kafka
  template:
    metadata:
      labels:
        app: sico-kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: plaintext
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://:9092,CONTROLLER://:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://sico-kafka:9092
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256m -Xmx512m"
            - name: CLUSTER_ID
              value: sico-kafka-cluster-001
            # Bound resource usage so the broker doesn't OOMKill on long-running deployments.
            # The producer (core) is chatty (per-chunk + 5s keepalives) and the consumer
            # (backend) uses no consumer group, so cleanup is purely time/size based.
            - name: KAFKA_HEAP_OPTS
              value: "-Xms256m -Xmx384m"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "2"
            - name: KAFKA_LOG_RETENTION_BYTES
              value: "268435456"          # 256 MiB per partition
            - name: KAFKA_LOG_SEGMENT_BYTES
              value: "67108864"           # 64 MiB segments -> faster cleanup
            - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
              value: "60000"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 512Mi
              cpu: 100m
            limits:
              memory: 1Gi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: sico-kafka
  namespace: sico
spec:
  selector:
    app: sico-kafka
  ports:
    - port: 9092
      targetPort: 9092
---
# -- Kafka topic init Job -----------------------------------------------------
apiVersion: batch/v1
kind: Job
metadata:
  name: sico-kafka-init
  namespace: sico
  labels:
    app: sico-kafka-init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: sico-kafka-init
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: apache/kafka:3.9.0
          command:
            - sh
            - -c
            - |
              until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server sico-kafka:9092 > /dev/null 2>&1; do
                echo "Waiting for Kafka..."
                sleep 5
              done
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: kafka-init
          image: apache/kafka:3.9.0
          command:
            - /opt/kafka/bin/kafka-topics.sh
            - --bootstrap-server
            - sico-kafka:9092
            - --create
            - --if-not-exists
            - --topic
            - core-backend
            - --partitions
            - "1"
            - --replication-factor
            - "1"
            - --config
            - retention.ms=7200000
            - --config
            - retention.bytes=268435456
            - --config
            - segment.bytes=67108864
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
# -- SeaweedFS Master ---------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-master-data
  namespace: sico
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-seaweedfs-master
  namespace: sico
  labels:
    app: sico-seaweedfs-master
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sico-seaweedfs-master
  template:
    metadata:
      labels:
        app: sico-seaweedfs-master
    spec:
      containers:
        - name: seaweedfs-master
          image: chrislusf/seaweedfs:3.80
          command: ["weed", "master", "-ip=sico-seaweedfs-master", "-ip.bind=0.0.0.0", "-port=9333"]
          ports:
            - containerPort: 9333
              name: master
            - containerPort: 19333
              name: master-grpc
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /dir/status
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /dir/status
              port: 9333
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-master-data
---
apiVersion: v1
kind: Service
metadata:
  name: sico-seaweedfs-master
  namespace: sico
spec:
  selector:
    app: sico-seaweedfs-master
  ports:
    - name: http
      port: 9333
      targetPort: 9333
    - name: grpc
      port: 19333
      targetPort: 19333
---
# -- SeaweedFS Volume ---------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-volume-data
  namespace: sico
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
