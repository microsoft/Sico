# -- Nginx reverse proxy ------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: sico
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    pid /tmp/nginx.pid;
    http {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        server_tokens off;

        access_log /dev/stdout;
        error_log /dev/stderr;

        # Use kube-dns resolver
        resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

        # Map for WebSocket upgrade (used by emulator VNC H264 stream).
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      close;
        }

        # Rate limiting: 10 requests/sec per client IP, burst up to 20
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

        server {
            listen 8080;
            server_name _;

            # Security headers
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

            set $backend_upstream http://sico-backend.sico.svc.cluster.local:8080;

            # Swagger UI needs permissive CSP to load its own CSS/JS assets
            location /api/sico/docs/ {
                proxy_pass $backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
                add_header X-Content-Type-Options "nosniff" always;
            }

            # Emulator VNC viewer is embedded as a same-origin iframe by the
            # SPA, so the server-level "X-Frame-Options: DENY" /
            # "frame-ancestors 'none'" headers must be relaxed to SAMEORIGIN
            # for these routes. Also needs WebSocket upgrade for the H264
            # stream at /ws/h264.
            location ~ ^/api/sico/sandbox/resources/emulator/ {
                proxy_pass $backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_buffering off;
                proxy_read_timeout 3600s;
                client_max_body_size 10M;

                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; media-src 'self' blob:; frame-ancestors 'self'" always;
                add_header X-Content-Type-Options "nosniff" always;
            }

            location /api/ {
                limit_req zone=api_limit burst=20 nodelay;

                proxy_pass $backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_buffering off;
                proxy_read_timeout 60s;
                client_max_body_size 10M;

                # The backend stores object URLs as the cluster-internal filer
                # address (used by core/sandbox), but browsers can't resolve
                # that hostname. Rewrite it to the same-origin /storage path
                # served by this nginx so SPA fetches go through the proxy.
                # `sub_filter` requires the upstream response to be uncompressed.
                proxy_set_header Accept-Encoding "";
                sub_filter_once off;
                sub_filter_types application/json;
                sub_filter 'http://sico-seaweedfs-filer:14003' '/storage';
                sub_filter 'http:\/\/sico-seaweedfs-filer:14003' '\/storage';
            }

            location /health {
                proxy_pass $backend_upstream;
            }

            # Lightweight liveness endpoint served by nginx itself, used by
            # the kubelet probes so they don't depend on upstream readiness.
            location = /nginx-health {
                access_log off;
                return 200 "ok";
                add_header Content-Type text/plain;
            }

            # Proxy storage requests to SeaweedFS filer
            set $seaweedfs_upstream http://sico-seaweedfs-filer.sico.svc.cluster.local:14003;

            # HTML deliverables produced by agents (e.g. generated reports) are
            # previewed inside a same-origin sandboxed iframe in the SPA's
            # FileDrawer. Relax the storage-level "DENY"/"frame-ancestors 'none'"
            # headers to SAMEORIGIN/'self' for .html/.md responses, so the iframe
            # is allowed to load. The sandbox attribute on the iframe still
            # isolates script execution from the parent origin.
            location ~ ^/storage/.*\.(html|md)$ {
                rewrite ^/storage/(.*) /$1 break;
                proxy_pass $seaweedfs_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_buffering off;


                # Rewrite internal filer URLs embedded in generated HTML/Markdown
                # deliverables to the same-origin /storage path; `sub_filter` needs uncompressed
                # upstream responses.
                proxy_set_header Accept-Encoding "";
                sub_filter_once off;
                sub_filter_types text/markdown text/plain;
                sub_filter 'http://sico-seaweedfs-filer:14003' '/storage';
                sub_filter 'http:\/\/sico-seaweedfs-filer:14003' '\/storage';

                add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'self'" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "SAMEORIGIN" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            }

            location /storage/ {
                rewrite ^/storage/(.*) /$1 break;
                proxy_pass $seaweedfs_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_buffering off;

                add_header Content-Security-Policy "default-src 'none'; script-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            }

            # Everything else is the React SPA, served by the frontend Deployment.
            set $frontend_upstream http://sico-frontend.sico.svc.cluster.local:80;
            location / {
                proxy_pass $frontend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # The server-level CSP (default-src 'none') would block the SPA's
                # own JS/CSS/fonts. Replace it with one that allows same-origin
                # assets plus the inline styles/styled-components the app uses.
                add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'" always;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-nginx
  namespace: sico
  labels:
    app: sico-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sico-nginx
  template:
    metadata:
      labels:
        app: sico-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "SETGID", "SETUID"]
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
            limits:
              memory: 64Mi
              cpu: 100m
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sico-nginx
  namespace: sico
spec:
  selector:
    app: sico-nginx
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# -- Kafka UI -----------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-kafka-ui
  namespace: sico
  labels:
    app: sico-kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sico-kafka-ui
  template:
    metadata:
      labels:
        app: sico-kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: local
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: sico-kafka:9092
          startupProbe:
            httpGet:
              path: /api/clusters
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/clusters
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/clusters
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 768Mi
              cpu: 500m
---
apiVersion: v1
kind: Service
metadata:
  name: sico-kafka-ui
  namespace: sico
spec:
  selector:
    app: sico-kafka-ui
  ports:
    - name: http
      port: 8080
      targetPort: 8080
