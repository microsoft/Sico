              mountPath: /data
          readinessProbe:
            httpGet:
              path: /status
              port: 9334
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 9334
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-volume-data
---
apiVersion: v1
kind: Service
metadata:
  name: sico-seaweedfs-volume
  namespace: sico
spec:
  selector:
    app: sico-seaweedfs-volume
  ports:
    - name: http
      port: 9334
      targetPort: 9334
    - name: grpc
      port: 19334
      targetPort: 19334
---
# -- SeaweedFS Filer ----------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-filer-data
  namespace: sico
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sico-seaweedfs-filer
  namespace: sico
  labels:
    app: sico-seaweedfs-filer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sico-seaweedfs-filer
  template:
    metadata:
      labels:
        app: sico-seaweedfs-filer
    spec:
      containers:
        - name: seaweedfs-filer
          image: chrislusf/seaweedfs:3.80
          command: ["weed", "filer", "-master=sico-seaweedfs-master:9333", "-ip.bind=0.0.0.0", "-port=9335"]
          ports:
            - containerPort: 9335
              name: filer
            - containerPort: 19335
              name: filer-grpc
          readinessProbe:
            httpGet:
              path: /
              port: 9335
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 9335
            initialDelaySeconds: 20
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
              cpu: 250m
          volumeMounts:
            # The filer keeps its metadata index here (default leveldb2 store).
            # Without persistent storage, every pod restart wipes the index and
            # orphans every previously uploaded object.
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-filer-data
---
apiVersion: v1
kind: Service
metadata:
  name: sico-seaweedfs-filer
  namespace: sico
spec:
  selector:
    app: sico-seaweedfs-filer
  ports:
    - name: http
      port: 14003
      targetPort: 9335
    - name: grpc
      port: 19335
      targetPort: 19335
---
