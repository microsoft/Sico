events {
    worker_connections 1024;
}
pid /tmp/nginx.pid;
http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    access_log /dev/stdout;
    error_log /dev/stderr;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Map for WebSocket upgrade (used by emulator VNC H264 stream).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate limiting: 10 requests/sec per client IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 8080;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

        # Use a variable so nginx re-resolves DNS via the resolver directive
        # (static upstream blocks only resolve at startup and go stale on container recreate)
        set $backend_upstream http://backend:8080;

        # Swagger UI needs permissive CSP to load its own CSS/JS assets
        location /api/sico/docs/ {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Override the restrictive CSP for Swagger UI
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Emulator VNC viewer is embedded as a same-origin iframe by the SPA,
        # so the server-level "X-Frame-Options: DENY" / "frame-ancestors 'none'"
        # headers must be relaxed to SAMEORIGIN for these routes. Also needs
        # WebSocket upgrade for the H264 stream.
        location ~ ^/api/sico/sandbox/resources/emulator/ {
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_read_timeout 3600s;
            client_max_body_size 10M;

            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; media-src 'self' blob:; frame-ancestors 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_read_timeout 60s;
            client_max_body_size 10M;

            # The backend stores object URLs as the cluster-internal filer
            # address (used by core/sandbox), but browsers can't resolve that
            # hostname. Rewrite it to the same-origin /storage path served by
            # this nginx so SPA fetches go through the reverse proxy.
            # `sub_filter` requires the upstream response to be uncompressed.
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types application/json text/event-stream text/plain;
            sub_filter 'http://seaweedfs-filer:14003' '/storage';
            sub_filter 'http:\/\/seaweedfs-filer:14003' '\/storage';
        }

        location /health {
            proxy_pass $backend_upstream;
        }

        # Lightweight liveness endpoint served by nginx itself.
        location = /nginx-health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }

        # Proxy storage requests to SeaweedFS filer
        set $seaweedfs_upstream http://seaweedfs-filer:14003;

        # HTML deliverables produced by agents (e.g. generated reports) are
        # previewed inside a same-origin sandboxed iframe in the SPA's
        # FileDrawer. Relax the storage-level "DENY"/"frame-ancestors 'none'"
        # headers to SAMEORIGIN/'self' for .html responses only, so the iframe
        # is allowed to load. The sandbox attribute on the iframe still
        # isolates script execution from the parent origin.
        location ~ ^/storage/.*\.html$ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass $seaweedfs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;

            # Rewrite internal filer URLs embedded in generated HTML reports
            # to the same-origin /storage path; `sub_filter` needs uncompressed
            # upstream responses.
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter 'http://seaweedfs-filer:14003' '/storage';
            sub_filter 'http:\/\/seaweedfs-filer:14003' '\/storage';

            add_header Content-Security-Policy "default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'self'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        location /storage/ {
            rewrite ^/storage/(.*) /$1 break;
            proxy_pass $seaweedfs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;

            add_header Content-Security-Policy "default-src 'none'; script-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Everything else is the React SPA, served by the frontend container.
        set $frontend_upstream http://frontend:80;
        location / {
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # The server-level CSP (default-src 'none') would block the SPA's
            # own JS/CSS/fonts. Replace it with one that allows same-origin
            # assets plus the inline styles/styled-components the app uses.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' blob:; worker-src 'self' blob:; frame-src 'self' https://view.officeapps.live.com; frame-ancestors 'none'" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
    }
}
