# Copy this file (drop the -template suffix) and fill in the placeholders
# before enabling. The loader skips descriptors where `template: true`.
template: true
model_key: gpt5.4
display_name: GPT-5.4
description: Azure OpenAI multimodal model for text and image understanding.
default: false
model_type: multimodal
provider_template_type: azure_openai
config:
  deployment_name: gpt-5.4
  endpoint: https://YOUR-RESOURCE.cognitiveservices.azure.com/
  # Auth: set AZURE_OPENAI_API_KEY for key-based auth. Leave the env var unset
  # to fall back to Azure managed identity (DefaultAzureCredential).
  api_key: ${AZURE_OPENAI_API_KEY:-}
  api_version: preview
  timeout_ms: 60000
  max_tokens: 128000
  context_length: 1048576
  # OpenAI introduced the "original" image detail level with gpt-5.4, but
  # support is deployment-specific. This template opts in because current
  # GPT-5.4 mainline deployments accept it; remove ``original`` if your
  # target deployment rejects it. OpenAI recommends ``original`` for
  # computer-use / screenshot inputs when available.
  supported_image_detail_levels: [auto, low, high, original]
