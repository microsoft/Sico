# Copy this file (drop the -template suffix) and set OPENROUTER_API_KEY
# before enabling. The loader skips descriptors where `template: true`.
template: true
model_key: openrouter-gpt-5-4
display_name: OpenRouter GPT-5.4
description: GPT-5.4 routed through OpenRouter via the openai_compatible adapter.
default: false
model_type: multimodal
provider_template_type: openai_compatible
io_profile:
  input_types:
    - text
    - image
  output_types:
    - text
    - json
  supports_tools: true
  supports_previous_response_id: false
  supports_structured_output: true
  supports_reasoning: true
config:
  base_url: https://openrouter.ai/api/v1
  upstream_model_name: openai/gpt-5.4
  # OpenRouter speaks both Chat Completions and Responses APIs; chat is more
  # broadly compatible and mirrors what most OpenRouter users call.
  use_chat_completions: true
  bearer_token: ${OPENROUTER_API_KEY}
  timeout_ms: 60000
  max_tokens: 128000
  context_length: 1048576
